<VirtualHost *:80>
    # 請將 ServerName 改為您的 IP 或網域名稱
    # ServerName example.com
    # ServerAdmin webmaster@localhost

    # 設定專案路徑，請修改 /path/to/anki_pi 為您的實際路徑
    # 例如：/home/pi/anki_pi
    DocumentRoot /path/to/anki_pi

    # WSGI 設定
    # python-home: 如果您使用 venv，請指向 venv 目錄，例如 /home/pi/anki_pi/venv
    # python-path: 指向專案根目錄
    WSGIDaemonProcess anki_pi python-path=/path/to/anki_pi
    WSGIProcessGroup anki_pi
    WSGIScriptAlias / /path/to/anki_pi/wsgi.py

    <Directory /path/to/anki_pi>
        Require all granted
    </Directory>

    # 錯誤日誌
    ErrorLog ${APACHE_LOG_DIR}/anki_pi_error.log
    CustomLog ${APACHE_LOG_DIR}/anki_pi_access.log combined
</VirtualHost>
