{% extends "layout.html" %}
{% block content %}
    <div class="d-flex justify-between align-center mb-2">
        <div style="display: flex; align-items: center; gap: 10px;">
            <h3 style="margin: 0;">管理資料夾: <span style="color: var(--primary-color);">{{ folder.name }}</span></h3>
        </div>
        <a href="{{ url_for('manage_decks') }}" class="btn btn-secondary">← 返回</a>
    </div>

    <div class="card">
        <form method="POST" action="{{ url_for('manage_folder_content', folder_id=folder.id) }}">
            <div class="d-flex justify-between align-center mb-2">
                <h4 style="margin: 0;">選擇要包含的牌組</h4>
                <div class="text-secondary" style="font-size: 0.9rem;">
                    已選擇 <span id="selected-count">{{ associated_deck_ids|length }}</span> 個牌組
                </div>
            </div>

            <div class="grid-list" style="max-height: 60vh; overflow-y: auto; padding: 5px;">
                {% for deck in all_decks %}
                <label class="deck-option-card">
                    <input
                        type="checkbox"
                        name="deck_ids"
                        value="{{ deck.id }}"
                        class="deck-checkbox"
                        {% if deck.id in associated_deck_ids %}checked{% endif %}
                        onchange="updateCount(this)">
                    <div class="deck-content">
                        <span class="deck-icon">📇</span>
                        <span class="deck-name">{{ deck.name }}</span>
                    </div>
                    <div class="check-indicator">✓</div>
                </label>
                {% else %}
                <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-secondary);">
                    <p>目前沒有可用的牌組。</p>
                    <a href="{{ url_for('manage_decks') }}" class="btn btn-primary">去建立一個牌組</a>
                </div>
                {% endfor %}
            </div>

            <div style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; display: flex; justify-content: flex-end; gap: 10px;">
                <a href="{{ url_for('manage_decks') }}" class="btn btn-gray">取消</a>
                <button type="submit" class="btn btn-primary">儲存變更</button>
            </div>
        </form>
    </div>

    <style>
        .deck-option-card {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background-color: var(--bg-color);
            user-select: none;
        }

        .deck-option-card:hover {
            border-color: var(--primary-color);
            background-color: var(--card-bg);
            box-shadow: var(--shadow-sm);
        }

        /* Hide the actual checkbox but keep it functional */
        .deck-checkbox {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        /* Checkbox Checked State Styles */
        .deck-checkbox:checked + .deck-content + .check-indicator {
            opacity: 1;
            transform: scale(1);
        }

        .deck-checkbox:checked ~ .deck-content {
            color: var(--primary-color);
            font-weight: 600;
        }

        .deck-option-card:has(.deck-checkbox:checked) {
            border-color: var(--primary-color);
            background-color: rgba(13, 110, 253, 0.05); /* Very light blue */
        }
        [data-theme="dark"] .deck-option-card:has(.deck-checkbox:checked) {
            background-color: rgba(77, 171, 247, 0.1);
        }

        .deck-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            font-size: 1.1rem;
        }

        .deck-icon {
            font-size: 1.5rem;
        }

        .check-indicator {
            background-color: var(--primary-color);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>

    <script>
        function updateCount(checkbox) {
            const checkboxes = document.querySelectorAll('.deck-checkbox:checked');
            document.getElementById('selected-count').innerText = checkboxes.length;
        }
    </script>
{% endblock %}
