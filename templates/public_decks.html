{% extends "layout.html" %}
{% block content %}
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h3>🌐 公開牌組</h3>
        <a href="/" class="btn btn-gray">返回</a>
    </div>

    <div class="card">
        <p>在這裡你可以複製其他使用者分享的公開牌組。</p>
        <ul style="list-style: none; padding: 0;">
            {% for deck in decks %}
            <li style="display: flex; justify-content: space-between; align-items: center; padding: 12px 8px; border-bottom: 1px solid var(--border-color);">
                <div>
                    <strong>{{ deck.deck_name }}</strong>
                    <br>
                    <small>由 {{ deck.username }} 分享 | {{ deck.card_count }} 張卡片</small>
                </div>
                <form method="POST" action="{{ url_for('clone_public_deck', deck_id=deck.deck_id) }}" onsubmit="return confirm('確定要複製「{{ deck.deck_name }}」嗎？');" style="margin: 0;">
                    <button type="submit" class="btn btn-green" style="padding: 8px 15px;">複製</button>
                </form>
            </li>
            {% else %}
            <li>目前沒有任何公開的牌組。</li>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
