{% extends "layout.html" %}
{% block content %}
<div class="card" style="max-width: 450px; margin: 2rem auto;">
    <h3 class="text-center">登入</h3>
    <form method="POST">
        <label for="username">使用者名稱:</label>
        <input type="text" name="username" id="username" required>
        
        <label for="password">密碼:</label>
        <input type="password" name="password" id="password" required>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">登入</button>
    </form>
    <div class="text-center" style="margin-top: 1rem;">
        <p>還沒有帳號嗎？ <a href="{{ url_for('register') }}">註冊一個</a></p>
    </div>
</div>
{% endblock %}
