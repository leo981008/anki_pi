{% extends "layout.html" %}
{% block content %}
    <h3>新增卡片</h3>
    <form method="POST">
        <label for="deck_id">選擇牌組:</label>
        <select name="deck_id" id="deck_id" required>
            <option value="" disabled selected>-- 請選擇 --</option>
            {% for folder in folders %}
                <optgroup label="{{ folder.name }}">
                    {% for deck in folder.decks %}
                        <option value="{{ deck.id }}">{{ deck.name }}</option>
                    {% endfor %}
                </optgroup>
            {% endfor %}
        </select>

        <label for="front">正面 (問題):</label>
        <input type="text" name="front" id="front" required>
        
        <label for="back">背面 (答案):</label>
        <textarea name="back" id="back" rows="5" required></textarea>
        
        <label>卡片類型:</label>
        <select name="card_type">
            <option value="recognize">只要認得</option>
            <option value="spell">需要會拼</option>
        </select>
        
        <div style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn-green">儲存</button>
            <a href="/" class="btn btn-gray">返回</a>
        </div>
    </form>
{% endblock %}
