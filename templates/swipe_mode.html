<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>速記模式</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 頂部導覽 */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            z-index: 10;
        }
        
        header a {
            text-decoration: none;
            color: #555;
            font-size: 1rem;
            background: rgba(255,255,255,0.8);
            padding: 8px 12px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 卡片容器 */
        #card-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 55vh; /* 卡片高度佔螢幕 55% */
            perspective: 1000px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            font-size: 2em;
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.3s ease, background-color 0.3s;
            position: relative; 
        }
        
        /* 翻面後的樣式 */
        .flashcard.flipped {
            background-color: #fffbe6; /* 翻面變微黃色 */
        }

        .front-text {
            font-weight: 500;
            color: #333;
            line-height: 1.4;
            white-space: pre-line; /* 讓後端的 \n 換行符號生效 */
        }

        .back-content {
            display: none;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            width: 80%;
            color: #555;
            font-size: 0.8em; /* 背面字小一點 */
            font-weight: bold;
        }

        /* 底部按鈕區 */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            width: 90%;
            max-width: 400px;
            justify-content: center;
        }

        .btn-action {
            flex: 1;
            padding: 15px 0;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            outline: none;
        }

        .btn-no {
            background-color: #fff;
            color: #ff4d4d;
            border: 2px solid #ffebeb;
        }
        .btn-no:active { background-color: #ffebeb; transform: scale(0.95); }

        .btn-yes {
            background-color: #fff;
            color: #28a745;
            border: 2px solid #e8f5e9;
        }
        .btn-yes:active { background-color: #e8f5e9; transform: scale(0.95); }

        /* 發音按鈕樣式 */
        .tts-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 1.2rem;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .tts-btn:active { background: #eee; }

        /* 點擊提示文字 */
        .click-hint {
            margin-top: auto; 
            font-size: 0.4em; 
            color: #ccc;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

    <header>
        <a href="/">↩ 回首頁</a>
        <span id="due-count" style="font-size: 1rem; color: #333; background: rgba(255,255,255,0.8); padding: 8px 12px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);"></span>
    </header>

    <div id="card-container">
        <div style="text-align:center; color:#888; padding-top: 50%;">
            <p>載入中...</p>
        </div>
    </div>

    <div class="controls">
        <button class="btn-action btn-no" onclick="submitAnswer('left')">
            ✕ 忘記
        </button>
        <button class="btn-action btn-yes" onclick="submitAnswer('right')">
            ✓ 記得
        </button>
    </div>

    <script>
        let currentCardId = null;
        const container = document.getElementById('card-container');
        const dueCountElement = document.getElementById('due-count');

        // 初始化：載入第一張卡片
        loadNextCard();

        function loadNextCard() {
            // 呼叫後端 API
            fetch('/api/next_card')
                .then(res => res.json())
                .then(data => {
                    // 更新剩餘數量
                    if (data.due_count !== undefined) {
                        dueCountElement.innerHTML = `還剩 <b>${data.due_count}</b> 張`;
                    }

                    if (data.status === 'done') {
                        // 如果沒卡片了，顯示完成畫面
                        container.innerHTML = `
                            <div style="background:white; border-radius:20px; padding:30px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.1); margin-top: 30%;">
                                <h3 style="color:#28a745; font-size: 1.5em;">恭喜完成！</h3>
                                <p style="color:#666;">今天沒有其他單字了。</p>
                                <a href="/" style="display:inline-block; margin-top:20px; color:#007bff; text-decoration:none; border:1px solid #007bff; padding:10px 20px; border-radius:5px;">回首頁</a>
                            </div>
                        `;
                        document.querySelector('.controls').style.display = 'none';
                    } else {
                        currentCardId = data.id;
                        // 注意：這裡接收 backend 回傳的 speech 欄位
                        renderCard(data.front, data.back, data.speech);
                    }
                })
                .catch(err => {
                    console.error(err);
                    container.innerHTML = '<p style="text-align:center; color:red;">連線錯誤，請重新整理</p>';
                });
        }

        function renderCard(front, back, speechText) {
            container.innerHTML = '';
            
            const card = document.createElement('div');
            card.className = 'flashcard';
            
            // 準備發音按鈕 HTML (如果有 speechText 才顯示)
            let ttsButtonHtml = '';
            if (speechText && speechText.length > 0) {
                const safeSpeech = speechText.replace(/'/g, "\\'");
                ttsButtonHtml = `
                    <button class="tts-btn" onclick="event.stopPropagation(); speak('${safeSpeech}')">
                        🔊
                    </button>
                `;
            }

            // 填充卡片內容
            card.innerHTML = `
                <div class="front-text">${front}</div>
                
                ${ttsButtonHtml}

                <div class="back-content">${back}</div>
                <div class="click-hint">(點擊翻面)</div>
            `;

            // 綁定點擊翻面事件
            card.onclick = function() {
                const backContent = card.querySelector('.back-content');
                
                // 檢查是否已經翻面
                if (backContent.style.display !== 'block') {
                    // 執行翻面
                    backContent.style.display = 'block';
                    card.classList.add('flipped'); // 改變背景顏色
                    card.querySelector('.click-hint').style.display = 'none'; // 隱藏提示

                    // 智慧發音邏輯：
                    // 如果正面沒有發音 (speechText 為空，代表這題是給中文猜英文)
                    // 則翻面時，自動唸出背面的英文答案
                    if (!speechText) {
                        speak(back); 
                    }
                }
            };

            container.appendChild(card);
        }

        function submitAnswer(direction) {
            if (currentCardId === null) return;

            const card = document.querySelector('.flashcard');
            
            // 動畫：卡片向上淡出
            if(card) {
                card.style.transform = 'translateY(-30px) scale(0.95)';
                card.style.opacity = '0';
            }

            // 提交結果給後端
            fetch('/api/submit_swipe', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ card_id: currentCardId, direction: direction })
            }).then(() => {
                // 給一點時間跑動畫，再載入下一張
                setTimeout(() => {
                    loadNextCard();
                }, 200);
            });
        }

        // 發音功能 (使用瀏覽器內建 Web Speech API)
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // 停止上一句，避免重疊
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; // 設定語言為美式英文
                u.rate = 0.9;     // 語速稍慢
                window.speechSynthesis.speak(u);
            }
        }
    </script>
</body>
</html>
