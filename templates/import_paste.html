{% extends "layout.html" %}
{% block content %}
    <h3>貼上內容匯入</h3>
    <p>請將 CSV 格式的內容貼到下方文字區。每行一筆資料，格式為 `正面,背面`。</p>
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label for="deck_id">選擇要匯入的牌組:</label>
            <select name="deck_id" id="deck_id" required>
                <option value="" disabled selected>-- 請選擇 --</option>
                {% for deck in decks %}
                    <option value="{{ deck.id }}">{{ deck.name }}</option>
                {% endfor %}
            </select>
        </div>

        <textarea name="csv_data" rows="15" placeholder="例如：
apple,蘋果
banana,香蕉
cat,貓" style="width: 100%; font-family: monospace;"></textarea>
        
        <div style="margin: 1rem 0;">
            <strong>將所有卡片設為:</strong>
            <div style="display: flex; gap: 1.5rem; margin-top: 0.5rem;">
                <span>
                    <input type="radio" id="type_recognize" name="card_type" value="recognize" checked>
                    <label for="type_recognize">只要認得</label>
                </span>
                <span>
                    <input type="radio" id="type_spell" name="card_type" value="spell">
                    <label for="type_spell">需要會拼</label>
                </span>
            </div>
        </div>

        <button type="submit" class="btn btn-green">匯入</button>
        <a href="/" class="btn btn-gray">返回</a>
    </form>
{% endblock %}
