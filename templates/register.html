{% extends "layout.html" %}
{% block content %}
<div class="card" style="max-width: 450px; margin: 2rem auto;">
    <h3 class="text-center">註冊新帳號</h3>
    <form method="POST">
        <label for="username">使用者名稱:</label>
        <input type="text" name="username" id="username" required>
        
        <label for="password">密碼:</label>
        <input type="password" name="password" id="password" required>

        <label for="confirm_password">確認密碼:</label>
        <input type="password" name="confirm_password" id="confirm_password" required>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">註冊</button>
    </form>
    <div class="text-center" style="margin-top: 1rem;">
        <p>已經有帳號了？ <a href="{{ url_for('login') }}">直接登入</a></p>
    </div>
</div>
{% endblock %}
